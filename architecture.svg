  <text x="220" y="410" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.5">STATE &amp; SERVICES</text>
  <rect x="52" y="420" width="336" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="220" y="435" text-anchor="middle" font-size="10" fill="#94a3b8">api.ts — typed fetch client</text>
  <text x="220" y="450" text-anchor="middle" font-size="10" fill="#64748b">localStorage: sessionId · firstQuestion · firstAudio · jdRole</text>

