  <text x="102" y="372" text-anchor="middle" font-size="10" fill="#94a3b8">QuestionCard</text>

  <rect x="168" y="348" width="100" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="218" y="372" text-anchor="middle" font-size="10" fill="#94a3b8">AudioRecorder</text>

  <rect x="284" y="348" width="100" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="334" y="372" text-anchor="middle" font-size="10" fill="#94a3b8">ScorePanel</text>

