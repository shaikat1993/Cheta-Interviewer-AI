  <text x="680" y="434" text-anchor="middle" font-size="10" fill="#64748b">UUID session token · JD profile · resume profile · scores · transcript log</text>

  <!-- Document parser -->
  <rect x="510" y="460" width="340" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="680" y="479" text-anchor="middle" font-size="10" fill="#94a3b8">document_parser.py</text>
  <text x="680" y="494" text-anchor="middle" font-size="10" fill="#64748b">PyPDF2 · pdfminer · python-docx</text>

  <!-- ═══════════════════════════════ AI ZONE ═══════════════════════════════ -->
  <rect x="490" y="565" width="380" height="42" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="680" y="581" text-anchor="middle" font-size="11" font-weight="700" fill="#6ee7b7" letter-spacing="0.5">GOOGLE GEMINI API</text>
  <text x="680" y="597" text-anchor="middle" font-size="10" fill="#64748b">gemini-3.1-flash-lite-preview  ·  LLM  ·  Audio Transcription  ·  gTTS</text>

  <!-- ═══════════════════════════════ ARROWS ═══════════════════════════════ -->
  <!-- Frontend ↔ Backend HTTP -->
  <line x1="410" y1="310" x2="490" y2="310" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <line x1="490" y1="330" x2="410" y2="330" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="450" y="305" text-anchor="middle" font-size="9" fill="#3b82f6">HTTP POST/GET</text>
  <text x="450" y="345" text-anchor="middle" font-size="9" fill="#8b5cf6">JSON response</text>

  <!-- Backend ↔ Gemini -->
  <line x1="680" y1="557" x2="680" y2="507" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="720" y="540" text-anchor="middle" font-size="9" fill="#10b981">API calls</text>

</svg>
