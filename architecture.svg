  <rect x="510" y="138" width="160" height="32" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="590" y="158" text-anchor="middle" font-size="10" fill="#c4b5fd">POST /submit-jd</text>

  <rect x="688" y="138" width="162" height="32" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="769" y="158" text-anchor="middle" font-size="10" fill="#c4b5fd">POST /upload-resume</text>

  <rect x="510" y="182" width="160" height="32" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="590" y="202" text-anchor="middle" font-size="10" fill="#c4b5fd">POST /transcribe-audio</text>

  <rect x="688" y="182" width="162" height="32" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="769" y="202" text-anchor="middle" font-size="10" fill="#c4b5fd">POST /submit-answer</text>

  <rect x="598" y="226" width="162" height="32" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="679" y="246" text-anchor="middle" font-size="10" fill="#c4b5fd">GET /generate-report</text>

  <!-- Services -->
  <text x="680" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.5">SERVICES</text>

  <rect x="510" y="290" width="100" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="560" y="305" text-anchor="middle" font-size="10" fill="#94a3b8">jd_service</text>
  <text x="560" y="320" text-anchor="middle" font-size="9" fill="#64748b">skill extraction</text>

  <rect x="624" y="290" width="100" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="674" y="305" text-anchor="middle" font-size="10" fill="#94a3b8">resume_service</text>
  <text x="674" y="320" text-anchor="middle" font-size="9" fill="#64748b">profile parsing</text>

  <rect x="738" y="290" width="112" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="794" y="305" text-anchor="middle" font-size="10" fill="#94a3b8">interview_service</text>
  <text x="794" y="320" text-anchor="middle" font-size="9" fill="#64748b">Q generation</text>

  <rect x="510" y="346" width="100" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="560" y="361" text-anchor="middle" font-size="10" fill="#94a3b8">eval_service</text>
  <text x="560" y="376" text-anchor="middle" font-size="9" fill="#64748b">4-rubric scoring</text>

  <rect x="624" y="346" width="100" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="674" y="361" text-anchor="middle" font-size="10" fill="#94a3b8">report_service</text>
  <text x="674" y="376" text-anchor="middle" font-size="9" fill="#64748b">metrics compile</text>

  <rect x="738" y="346" width="112" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="794" y="361" text-anchor="middle" font-size="10" fill="#94a3b8">gemini_client</text>
  <text x="794" y="376" text-anchor="middle" font-size="9" fill="#64748b">LLM · STT · TTS</text>

