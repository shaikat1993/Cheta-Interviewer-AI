  <text x="129" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">Landing Page</text>
  <text x="129" y="160" text-anchor="middle" font-size="10" fill="#64748b">Entry / Hero</text>

  <!-- JD Page -->
  <rect x="220" y="122" width="168" height="52" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="304" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">Job Description</text>
  <text x="304" y="160" text-anchor="middle" font-size="10" fill="#64748b">Paste JD → extract skills</text>

  <!-- Upload Page -->
  <rect x="52" y="192" width="155" height="52" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="129" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#c4b5fd">Resume Upload</text>
  <text x="129" y="230" text-anchor="middle" font-size="10" fill="#64748b">PDF / DOCX parsing</text>

